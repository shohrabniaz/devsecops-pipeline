apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-demo
  namespace: demo
  labels:
    app: devsecops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devsecops-demo
  template:
    metadata:
      labels:
        app: devsecops-demo
    spec:
      containers:
        - name: app
          image: ghcr.io/shohrabniaz/devsecops-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: devsecops-demo
  namespace: demo
  labels:
    app: devsecops-demo
spec:
  selector:
    app: devsecops-demo
  ports:
    - port: 80
      targetPort: 8080
