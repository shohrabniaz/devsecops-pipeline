name: Build and Publish Image

on:
  push:
    branches: [main]
    paths:
      - app/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          tags: |
            ghcr.io/shohrabniaz/devsecops-pipeline:latest
            ghcr.io/shohrabniaz/devsecops-pipeline:${{ github.sha }}
